<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>SOFT BRICKS · 拼装模拟器</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: -apple-system, "PingFang SC", sans-serif; background: #16181d; overscroll-behavior: none; }
  #c { touch-action: none; }
  #c { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 16px; left: 16px; color: #eceff4;
    background: rgba(15,16,20,.82); border-radius: 14px; padding: 14px 18px;
    font-size: 14px; line-height: 1.7; backdrop-filter: blur(8px); user-select: none;
  }
  #hud b { font-size: 17px; letter-spacing: .5px; }
  #hud .dim { color: #9aa0ac; font-size: 12px; }
  #bar {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 9px; background: rgba(15,16,20,.82);
    padding: 12px 18px; border-radius: 14px; backdrop-filter: blur(8px); width: min(680px, 92vw);
  }
  #btns { display: flex; gap: 10px; justify-content: center; }
  #seek { width: 100%; accent-color: #c0121a; cursor: pointer; height: 22px; }
  button {
    background: #262a33; color: #eceff4; border: 0; border-radius: 9px;
    padding: 9px 16px; font-size: 14px; cursor: pointer;
  }
  button:hover { background: #333947; }
  button.acc { background: #c0121a; }
  button.acc:hover { background: #d8232b; }
  #prog { position: fixed; bottom: 0; left: 0; height: 4px; background: #c0121a; width: 0; transition: width .25s; }
  #seek::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #e8323c; }
  #seek { -webkit-appearance: none; background: #3a3f4b; border-radius: 4px; height: 8px; }
  @media (max-width: 640px), (pointer: coarse) and (max-height: 500px) {
    #hud { top: 8px; left: 8px; right: 8px; padding: 9px 12px; font-size: 12px; line-height: 1.5; border-radius: 11px; }
    #hud b { font-size: 15px; }
    #hud .dim { font-size: 10px; }
    #setsel { font-size: 12px; max-width: 46vw; }
    #bar { width: calc(100vw - 16px); bottom: calc(8px + env(safe-area-inset-bottom)); padding: 9px 10px; gap: 7px; border-radius: 12px; }
    #btns { gap: 6px; }
    #btns button { flex: 1; padding: 11px 0; font-size: 14px; min-height: 42px; }
    #seek { height: 10px; }
    #seek::-webkit-slider-thumb { width: 24px; height: 24px; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <b id="title">加载中…</b>
  <select id="setsel" style="margin-left:10px;background:#262a33;color:#eceff4;border:0;border-radius:7px;padding:4px 8px;font-size:13px"></select><br>
  <span id="stat"></span><br>
  <span class="dim">点击发光零件安装 · 空格=装完本步 · 拖动旋转视角</span>
</div>
<div id="bar">
  <input id="seek" type="range" min="0" value="0" step="1">
  <div id="btns">
    <button id="prev">◀ 上一步</button>
    <button id="auto" class="acc">▶ 自动拼装</button>
    <button id="speed">1×</button>
    <button id="next">下一步 ▶</button>
    <button id="explode">💥 爆炸视图</button>
    <button id="reset">⟲ 重来</button>
  </div>
</div>
<div id="prog"></div>
<script type="importmap">
{ "imports": { "three": "./lib/three.module.js" } }
</script>
<script type="module" src="app.js"></script>
</body>
</html>
